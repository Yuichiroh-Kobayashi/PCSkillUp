<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドット絵データクエスト</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>ドット絵データクエスト</h1>
    <p class="lead">クリック・ドラッグ・コピペで、ドット絵をデータにしよう！</p>

    <section id="modeInstructions">
      <h2>ルール</h2>
      <ul id="instructionList"></ul>
      <p>少ない色でも、組み合わせると絵を表せます。</p>
    </section>

    <section class="grids">
      <div>
        <h2>見本（<span id="patternName"></span>）</h2>
        <div id="targetGrid" class="grid" aria-label="見本のドット絵"></div>
      </div>
      <div>
        <h2>作業グリッド（見本に合わせよう）</h2>
        <div id="editGrid" class="grid" aria-label="作業用ドット絵"></div>
      </div>
    </section>

    <section class="buttons">
      <button id="modeBtn" type="button">上級モードにする</button>
      <button id="clearBtn" type="button">全部消す</button>
      <button id="nextBtn" type="button">見本を変える</button>
      <button id="downloadBtn" type="button">今の絵をBMP保存</button>
      <div id="palette" class="palette" hidden aria-label="カラーパレット">
        <button class="swatch shade-0 selected" type="button" data-color="0" aria-pressed="true">白色</button>
        <button class="swatch shade-1" type="button" data-color="1" aria-pressed="false">銀色</button>
        <button class="swatch shade-2" type="button" data-color="2" aria-pressed="false">灰色</button>
        <button class="swatch shade-3" type="button" data-color="3" aria-pressed="false">黒色</button>
      </div>
    </section>
    <p id="downloadStatus" class="status" aria-live="polite"></p>

    <section>
      <h2>コピー＆貼り付け練習</h2>
      <p>下の文をドラッグして選び、Ctrl+C でコピーしよう。</p>
      <label for="copySource">コピーする文</label>
      <textarea id="copySource" rows="2" readonly></textarea>
      <p>コピーした文を下のテキストボックスに Ctrl+V で貼り付けよう。</p>
      <label for="pasteArea">貼り付け欄</label>
      <textarea id="pasteArea" rows="3"></textarea>
      <p id="pasteStatus" class="status" aria-live="polite"></p>
      <p id="missionStatus" class="status strong" aria-live="polite"></p>
    </section>
  </main>
  <script src="patterns.js"></script>
  <script src="bmp.js"></script>
  <script src="app.js"></script>
</body>
</html>
