<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドット絵PC操作ミッション</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>ドット絵PC操作ミッション</h1>
    <p class="lead">1の場所をクリックして、白黒のドット絵を完成させよう。</p>

    <section>
      <h2>ルール</h2>
      <ul>
        <li>作業グリッドの「1」がある場所を黒くぬろう。</li>
        <li>白いマスをクリックすると黒になります。</li>
        <li>黒いマスをクリックすると白に戻ります。</li>
        <li>ドラッグすると、続けてぬれます。</li>
      </ul>
      <p>1の場所を黒くぬると、白黒のドット絵になります。黒と白の組み合わせで、絵を表せます。</p>
    </section>

    <section class="grids">
      <div>
        <h2>見本（<span id="patternName"></span>）</h2>
        <div id="targetGrid" class="grid" aria-label="見本のドット絵"></div>
      </div>
      <div>
        <h2>作業グリッド（1の場所をぬろう）</h2>
        <div id="editGrid" class="grid" aria-label="作業用ドット絵" role="grid"></div>
      </div>
    </section>

    <section class="buttons">
      <button id="clearBtn" type="button">全部消す</button>
      <button id="undoBtn" type="button">1つ戻す</button>
      <button id="nextBtn" type="button">見本を変える</button>
    </section>

    <section>
      <h2>コピー＆貼り付け練習</h2>
      <p>下の文をドラッグで選んで、Ctrl+C でコピーしよう。</p>
      <label for="copySource">コピーする文</label>
      <textarea id="copySource" rows="2" readonly>ドット絵を完成させました</textarea>
      <p>コピーした文を下の箱に Ctrl+V で貼り付けよう。</p>
      <label for="pasteArea">貼り付け欄</label>
      <textarea id="pasteArea" rows="3"></textarea>
      <p id="pasteStatus" class="status" aria-live="polite"></p>
      <p id="missionStatus" class="status strong" aria-live="polite"></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
