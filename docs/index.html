<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ドット絵PC操作ミッション</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>ドット絵PC操作ミッション</h1>
    <p class="lead">マスをクリックして、白黒のドット絵を完成させよう。</p>

    <section>
      <h2>ルール</h2>
      <ul>
        <li>白いマスをクリックすると黒になります。</li>
        <li>黒いマスをクリックすると白に戻ります。</li>
        <li>ドラッグすると、続けてぬれます。</li>
      </ul>
    </section>

    <section class="grids">
      <div>
        <h2>見本（<span id="patternName"></span>）</h2>
        <div id="targetGrid" class="grid" aria-label="見本のドット絵"></div>
      </div>
      <div>
        <h2>作業グリッド</h2>
        <div id="editGrid" class="grid" aria-label="作業用ドット絵" role="grid"></div>
      </div>
    </section>

    <section class="buttons">
      <button id="clearBtn" type="button">全部消す</button>
      <button id="undoBtn" type="button">1つ戻す</button>
      <button id="nextBtn" type="button">見本を変える</button>
      <button id="copyBtn" type="button">0/1データをコピー</button>
    </section>

    <section>
      <h2>0/1データ</h2>
      <p>黒を1、白を0にすると、絵も0と1のデータとして表せます。</p>
      <label for="binaryData">現在の作業グリッドの0/1データ</label>
      <textarea id="binaryData" rows="17" readonly></textarea>
      <p id="copyMessage" class="status" aria-live="polite"></p>
    </section>

    <section>
      <h2>貼り付けチェック</h2>
      <p>コピーした0/1データを下の箱に Ctrl+V で貼り付けよう</p>
      <label for="pasteArea">貼り付け欄</label>
      <textarea id="pasteArea" rows="17"></textarea>
      <p id="pasteStatus" class="status" aria-live="polite"></p>
      <p id="missionStatus" class="status strong" aria-live="polite"></p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
